name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      INSTANCE_NAME: make-nashville-wiki
      ZONE: us-central1-a

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Write google-sa-key.json
        run: echo '${{ secrets.GOOGLE_SA_KEY_JSON }}' > /tmp/google-sa-key.json

      - name: Update instance metadata
        run: |
          gcloud compute instances add-metadata "$INSTANCE_NAME" \
            --zone="$ZONE" \
            --metadata=\
          domain="${{ secrets.DOMAIN }}",\
          secret-key="${{ secrets.SECRET_KEY }}",\
          utils-secret="${{ secrets.UTILS_SECRET }}",\
          postgres-password="${{ secrets.POSTGRES_PASSWORD }}",\
          gcs-access-key="${{ secrets.GCS_ACCESS_KEY }}",\
          gcs-secret-key="${{ secrets.GCS_SECRET_KEY }}",\
          gcs-bucket="${{ secrets.GCS_BUCKET }}",\
          slack-client-id="${{ secrets.SLACK_CLIENT_ID }}",\
          slack-client-secret="${{ secrets.SLACK_CLIENT_SECRET }}",\
          slack-webhook-url="${{ secrets.SLACK_WEBHOOK_URL }}",\
          shlink-db-password="${{ secrets.SHLINK_DB_PASSWORD }}",\
          oauth2-client-id="${{ secrets.OAUTH2_PROXY_CLIENT_ID }}",\
          oauth2-client-secret="${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}",\
          oauth2-cookie-secret="${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}",\
          oauth2-google-group="${{ secrets.OAUTH2_PROXY_GOOGLE_GROUPS }}",\
          oauth2-google-admin-email="${{ secrets.OAUTH2_PROXY_GOOGLE_ADMIN_EMAIL }}",\
          moodle-db-password="${{ secrets.MOODLE_DB_PASSWORD }}",\
          moodle-admin-password="${{ secrets.MOODLE_ADMIN_PASSWORD }}",\
          moodle-admin-email="${{ secrets.MOODLE_ADMIN_EMAIL }}",\
          moodle-webhook-secret="${{ secrets.MOODLE_WEBHOOK_SECRET }}",\
          grit-api-url="${{ secrets.GRIT_API_URL }}",\
          grit-api-key="${{ secrets.GRIT_API_KEY }}"

      - name: Upload files to server
        run: |
          gcloud compute scp deploy/S3Storage.js "$INSTANCE_NAME:~/S3Storage.js" --zone="$ZONE"
          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo mv ~/S3Storage.js /opt/outline/S3Storage.js && sudo chmod 644 /opt/outline/S3Storage.js'

          gcloud compute scp deploy/init-shlink-db.sql "$INSTANCE_NAME:~/init-shlink-db.sql" --zone="$ZONE"
          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo mv ~/init-shlink-db.sql /opt/outline/init-shlink-db.sql && sudo chmod 644 /opt/outline/init-shlink-db.sql'

          gcloud compute scp /tmp/google-sa-key.json "$INSTANCE_NAME:~/google-sa-key.json" --zone="$ZONE"
          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo mv ~/google-sa-key.json /opt/outline/google-sa-key.json && sudo chmod 644 /opt/outline/google-sa-key.json'

          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo mkdir -p /opt/outline/grit-provisioner'
          gcloud compute scp deploy/grit-provisioner/server.py "$INSTANCE_NAME:~/grit-server.py" --zone="$ZONE"
          gcloud compute scp deploy/grit-provisioner/course-tool-map.json "$INSTANCE_NAME:~/grit-course-tool-map.json" --zone="$ZONE"
          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo mv ~/grit-server.py /opt/outline/grit-provisioner/server.py && sudo mv ~/grit-course-tool-map.json /opt/outline/grit-provisioner/course-tool-map.json && sudo chmod 644 /opt/outline/grit-provisioner/*'

          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo mkdir -p /opt/outline/moodle-docker'
          gcloud compute scp deploy/moodle/Dockerfile "$INSTANCE_NAME:~/moodle-Dockerfile" --zone="$ZONE"
          gcloud compute scp deploy/moodle/entrypoint.sh "$INSTANCE_NAME:~/moodle-entrypoint.sh" --zone="$ZONE"
          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo mv ~/moodle-Dockerfile /opt/outline/moodle-docker/Dockerfile && sudo mv ~/moodle-entrypoint.sh /opt/outline/moodle-docker/entrypoint.sh && sudo chmod +x /opt/outline/moodle-docker/entrypoint.sh'

      - name: Deploy
        run: |
          gcloud compute scp deploy/update-server.sh "$INSTANCE_NAME:~/update-server.sh" --zone="$ZONE"
          gcloud compute ssh "$INSTANCE_NAME" --zone="$ZONE" --command='sudo bash ~/update-server.sh && rm ~/update-server.sh'

      - name: Update GCS bucket CORS
        run: |
          CORS_FILE=$(mktemp)
          echo '[{"origin":["https://${{ secrets.DOMAIN }}"],"method":["GET","PUT","POST","DELETE","HEAD"],"responseHeader":["Content-Type","Authorization","Content-MD5","x-goog-resumable"],"maxAgeSeconds":3600}]' > "$CORS_FILE"
          gcloud storage buckets update "gs://${{ secrets.GCS_BUCKET }}" --cors-file="$CORS_FILE"
          rm "$CORS_FILE"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/google-sa-key.json
