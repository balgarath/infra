services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      outline:
        condition: service_healthy
      shlink:
        condition: service_healthy
      shlink-web:
        condition: service_healthy
      oauth2-proxy:
        condition: service_started
      n8n:
        condition: service_healthy
      moodle:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:2019/config/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  outline:
    image: docker.getoutline.com/outlinewiki/outline:1.6.1
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./deploy/S3Storage.js:/opt/outline/build/server/storage/files/S3Storage.js:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/_health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  shlink:
    image: shlinkio/shlink:4
    restart: unless-stopped
    environment:
      - DEFAULT_DOMAIN=go.makenashville.org
      - IS_HTTPS_ENABLED=true
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=shlink
      - DB_USER=shlink
      - DB_PASSWORD=${SHLINK_DB_PASSWORD:-shlink}
      - REDIS_SERVERS=redis://redis:6379/2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/rest/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  shlink-web:
    image: shlinkio/shlink-web-client:4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    volumes:
      - ./deploy/google-sa-key.json:/etc/oauth2-proxy/google-sa-key.json:ro
    environment:
      - OAUTH2_PROXY_PROVIDER=google
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-placeholder}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-placeholder}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
      - OAUTH2_PROXY_COOKIE_SECURE=true
      - OAUTH2_PROXY_COOKIE_DOMAINS=.makenashville.org
      - OAUTH2_PROXY_WHITELIST_DOMAINS=.makenashville.org
      - OAUTH2_PROXY_EMAIL_DOMAINS=makenashville.org
      - OAUTH2_PROXY_GOOGLE_GROUPS=${OAUTH2_PROXY_GOOGLE_GROUPS:-}
      - OAUTH2_PROXY_GOOGLE_ADMIN_EMAIL=${OAUTH2_PROXY_GOOGLE_ADMIN_EMAIL:-}
      - OAUTH2_PROXY_GOOGLE_SERVICE_ACCOUNT_JSON=/etc/oauth2-proxy/google-sa-key.json
      - OAUTH2_PROXY_UPSTREAM=static://202
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_REVERSE_PROXY=true

  n8n:
    image: n8nio/n8n:stable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8n}
      - N8N_HOST=automations.makenashville.org
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://automations.makenashville.org
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-placeholder-change-me}
      - N8N_USER_MANAGEMENT_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - GENERIC_TIMEZONE=America/Chicago
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:5678/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  moodle:
    build: ./deploy/moodle
    restart: unless-stopped
    environment:
      - MOODLE_DB_HOST=postgres
      - MOODLE_DB_PORT=5432
      - MOODLE_DB_NAME=moodle
      - MOODLE_DB_USER=moodle
      - MOODLE_DB_PASSWORD=${MOODLE_DB_PASSWORD}
      - MOODLE_WWWROOT=https://learn.makenashville.org
      - MOODLE_ADMIN_PASSWORD=${MOODLE_ADMIN_PASSWORD}
      - MOODLE_ADMIN_EMAIL=${MOODLE_ADMIN_EMAIL}
      - MOODLE_REDIS_HOST=redis
      - MOODLE_REDIS_PORT=6379
      - MOODLE_REDIS_DB=3
    volumes:
      - moodle_data:/var/www/moodledata
      - moodle_local:/var/www/html/local
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H 'X-Forwarded-For: 127.0.0.1' http://localhost/login/index.php || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  grit-provisioner:
    image: python:3.12-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/grit-provisioner:/app:ro
    command: ["python", "/app/server.py"]
    environment:
      - GRIT_API_URL=${GRIT_API_URL}
      - GRIT_API_KEY=${GRIT_API_KEY}
      - WEBHOOK_SECRET=${MOODLE_WEBHOOK_SECRET}
      - COURSE_TOOL_MAP_PATH=/app/course-tool-map.json
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init-shlink-db.sql:/docker-entrypoint-initdb.d/init-shlink-db.sql:ro
      - ./deploy/init-n8n-db.sql:/docker-entrypoint-initdb.d/init-n8n-db.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "outline"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  n8n_data:
  moodle_data:
  moodle_local:
